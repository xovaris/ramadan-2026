<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>رمضان 2026 — القدس</title>

<!-- PWA / Home Screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="رمضان">
<meta name="theme-color" content="#faf7f2">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest-ar.json">

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="progress" id="progress"></div>
<button class="theme-toggle" id="themeToggle" aria-label="تغيير السمة"></button>
<a class="lang-toggle" href="index.html" aria-label="English version">EN</a>

<div class="app">
  <div class="header">
    <h1>رمضان 1447 / 2026</h1>
    <div class="city">القدس</div>
  </div>

  <div class="nav">
    <button id="next" aria-label="اليوم التالي">&#8249;</button>
    <div class="date-info">
      <div class="day-name" id="dayName"></div>
      <div class="gregorian" id="gregorian"></div>
      <div class="ramadan-day" id="ramadanDay"></div>
    </div>
    <button id="prev" aria-label="اليوم السابق">&#8250;</button>
  </div>

  <div class="card" id="card">
    <div class="times">
      <div class="time-block fajr">
        <div class="label">الفجر / السحور</div>
        <div class="time" id="fajrTime"></div>
        <div class="ampm" id="fajrAmpm"></div>
      </div>
      <div class="divider"></div>
      <div class="time-block maghrib">
        <div class="label">المغرب / الإفطار</div>
        <div class="time" id="maghribTime"></div>
        <div class="ampm" id="maghribAmpm"></div>
      </div>
    </div>
    <div class="fasting-hours">الصيام: <span id="fastHours"></span></div>
  </div>

  <div class="countdown" id="countdown">
    <div class="countdown-label" id="countdownLabel"></div>
    <div class="countdown-time" id="countdownTime"></div>
  </div>

  <div class="dua" id="dua">
    <div class="dua-text" id="duaText"></div>
  </div>

  <button class="today-btn" id="todayBtn">العودة لليوم</button>

  <div class="dots" id="dots"></div>
</div>

<script src="data.js"></script>
<script>
const LANG = {
  days: ["\u0627\u0644\u0623\u062d\u062f","\u0627\u0644\u0627\u062b\u0646\u064a\u0646","\u0627\u0644\u062b\u0644\u0627\u062b\u0627\u0621","\u0627\u0644\u0623\u0631\u0628\u0639\u0627\u0621","\u0627\u0644\u062e\u0645\u064a\u0633","\u0627\u0644\u062c\u0645\u0639\u0629","\u0627\u0644\u0633\u0628\u062a"],
  am: '\u0635',
  pm: '\u0645',
  fastingFmt: (h, m) => h + ' \u0633 ' + m + ' \u062f',
  ramadanDay: r => r + ' \u0631\u0645\u0636\u0627\u0646',
  dateFmt: dt => {
    const months = ["\u0643\u0627\u0646\u0648\u0646 \u0627\u0644\u062b\u0627\u0646\u064a","\u0634\u0628\u0627\u0637","\u0622\u0630\u0627\u0631","\u0646\u064a\u0633\u0627\u0646","\u0623\u064a\u0627\u0631","\u062d\u0632\u064a\u0631\u0627\u0646","\u062a\u0645\u0648\u0632","\u0622\u0628","\u0623\u064a\u0644\u0648\u0644","\u062a\u0634\u0631\u064a\u0646 \u0627\u0644\u0623\u0648\u0644","\u062a\u0634\u0631\u064a\u0646 \u0627\u0644\u062b\u0627\u0646\u064a","\u0643\u0627\u0646\u0648\u0646 \u0627\u0644\u0623\u0648\u0644"];
    return dt.getUTCDate() + ' ' + months[dt.getUTCMonth()] + ' ' + dt.getUTCFullYear();
  },
  countdown: {
    suhoor: '\u0627\u0644\u0635\u064a\u0627\u0645 \u064a\u0628\u062f\u0623 \u062e\u0644\u0627\u0644',
    iftar: '\u0627\u0644\u0625\u0641\u0637\u0627\u0631 \u062e\u0644\u0627\u0644',
    complete: r => '\u0631\u0645\u0636\u0627\u0646 ' + r + ' \u2014 \u062a\u0645',
  },
  updateDua: dua => {
    document.getElementById('duaText').textContent = dua.ar;
  },
  prevKey: 'ArrowRight',
  nextKey: 'ArrowLeft',
};
</script>
<script src="app.js"></script>

</body>
</html>
