<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ramadan 2026 — Jerusalem</title>

<!-- PWA / Home Screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ramadan">
<meta name="theme-color" content="#faf7f2">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="progress" id="progress"></div>
<button class="theme-toggle" id="themeToggle" aria-label="Switch theme"></button>
<a class="lang-toggle" href="ar.html" aria-label="النسخة العربية">عربي</a>

<div class="app">
  <div class="header">
    <h1>Ramadan 1447 / 2026</h1>
    <div class="city">Jerusalem</div>
  </div>

  <div class="nav">
    <button id="prev" aria-label="Previous day">&#8249;</button>
    <div class="date-info">
      <div class="day-name" id="dayName"></div>
      <div class="gregorian" id="gregorian"></div>
      <div class="ramadan-day" id="ramadanDay"></div>
    </div>
    <button id="next" aria-label="Next day">&#8250;</button>
  </div>

  <div class="card" id="card">
    <div class="times">
      <div class="time-block fajr">
        <div class="label">Fajr / Suhoor</div>
        <div class="time" id="fajrTime"></div>
        <div class="ampm" id="fajrAmpm"></div>
      </div>
      <div class="divider"></div>
      <div class="time-block maghrib">
        <div class="label">Maghrib / Iftar</div>
        <div class="time" id="maghribTime"></div>
        <div class="ampm" id="maghribAmpm"></div>
      </div>
    </div>
    <div class="fasting-hours">Fasting: <span id="fastHours"></span></div>
  </div>

  <div class="countdown" id="countdown">
    <div class="countdown-label" id="countdownLabel"></div>
    <div class="countdown-time" id="countdownTime"></div>
  </div>

  <div class="dua" id="dua">
    <div class="dua-ar" id="duaAr"></div>
    <div class="dua-en" id="duaEn"></div>
  </div>

  <button class="today-btn" id="todayBtn">Back to today</button>

  <div class="dots" id="dots"></div>
</div>

<script src="data.js"></script>
<script>
const LANG = {
  days: ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
  am: 'AM',
  pm: 'PM',
  fastingFmt: (h, m) => h + 'h ' + m + 'm',
  ramadanDay: r => 'Ramadan ' + r,
  dateFmt: dt => {
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return months[dt.getUTCMonth()] + ' ' + dt.getUTCDate() + ', ' + dt.getUTCFullYear();
  },
  countdown: {
    suhoor: 'Fasting begins in',
    iftar: 'Iftar in',
    complete: r => 'Ramadan ' + r + ' complete',
  },
  updateDua: dua => {
    document.getElementById('duaAr').textContent = dua.ar;
    document.getElementById('duaEn').textContent = dua.en;
  },
  prevKey: 'ArrowLeft',
  nextKey: 'ArrowRight',
};
</script>
<script src="app.js"></script>

</body>
</html>
