<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Dark (default) */
  :root, [data-theme="dark"] {
    --bg: #0a0a0c;
    --card: #141418;
    --card-border: #1e1e24;
    --text: #e8e6e3;
    --dim: #6b6975;
    --accent: #c9a84c;
    --accent-soft: rgba(201, 168, 76, 0.12);
    --fajr: #5b8fb9;
    --maghrib: #d4785c;
    --today-glow: rgba(201, 168, 76, 0.06);
  }

  /* Light */
  [data-theme="light"] {
    --bg: #faf7f2;
    --card: #ffffff;
    --card-border: #e2ddd6;
    --text: #2a2520;
    --dim: #7a756e;
    --accent: #a67f1a;
    --accent-soft: rgba(166, 127, 26, 0.1);
    --fajr: #2e6a99;
    --maghrib: #b85a3a;
    --today-glow: rgba(166, 127, 26, 0.06);
  }

  /* High Contrast */
  [data-theme="hc"] {
    --bg: #ffffff;
    --card: #f0f0f0;
    --card-border: #222222;
    --text: #000000;
    --dim: #444444;
    --accent: #6d5000;
    --accent-soft: rgba(109, 80, 0, 0.12);
    --fajr: #0b3d6e;
    --maghrib: #8c2a0a;
    --today-glow: rgba(109, 80, 0, 0.08);
  }

  .progress {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    background: var(--accent);
    transition: width 0.3s ease;
    z-index: 20;
  }

  @media (min-width: 768px) {
    html { font-size: 18px; }
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    touch-action: pan-y;
    overscroll-behavior: none;
  }

  .app {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: calc(1.5rem + env(safe-area-inset-top)) 1rem calc(1.5rem + env(safe-area-inset-bottom));
    gap: 1.25rem;
    max-width: 420px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    text-align: center;
    flex-shrink: 0;
  }

  .header h1 {
    font-family: 'Amiri', serif;
    font-weight: 400;
    font-size: 0.95rem;
    color: var(--dim);
  }

  .header .city {
    font-family: 'Amiri', serif;
    font-weight: 700;
    font-size: 1.35rem;
    margin-top: 0.15rem;
  }

  /* Navigation */
  .nav {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-shrink: 0;
  }

  .nav button {
    background: none;
    border: 1px solid var(--card-border);
    color: var(--dim);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nav button:active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }

  .nav .date-info {
    text-align: center;
    min-width: 140px;
  }

  .nav .day-name {
    font-weight: 500;
    font-size: 0.95rem;
  }

  .nav .gregorian {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--dim);
    margin-top: 0.15rem;
  }

  .nav .ramadan-day {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 0.25rem;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 1.75rem 1.5rem;
    width: 100%;
    transition: opacity 0.15s, transform 0.15s;
    flex-shrink: 0;
  }

  .card.today {
    background: linear-gradient(135deg, var(--card), var(--today-glow));
    border-color: rgba(201, 168, 76, 0.2);
  }

  .card.slide-left {
    opacity: 0;
    transform: translateX(-20px);
  }

  .card.slide-right {
    opacity: 0;
    transform: translateX(20px);
  }

  .times {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
  }

  .time-block {
    flex: 1;
    text-align: center;
  }

  .time-block .label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .time-block.fajr .label { color: var(--fajr); }
  .time-block.maghrib .label { color: var(--maghrib); }

  .time-block .time {
    font-weight: 700;
    font-size: 2rem;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .time-block .ampm {
    font-weight: 300;
    font-size: 0.75rem;
    color: var(--dim);
    margin-top: 0.25rem;
  }

  .divider {
    width: 1px;
    background: var(--card-border);
    align-self: stretch;
    margin: 0 0.25rem;
    flex-shrink: 0;
  }

  .fasting-hours {
    text-align: center;
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid var(--card-border);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--dim);
    letter-spacing: 0.08em;
  }

  .fasting-hours span {
    color: var(--text);
    font-weight: 500;
  }

  /* Countdown */
  .countdown {
    text-align: center;
    flex-shrink: 0;
    min-height: 3.5rem;
  }

  .countdown .countdown-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 0.3rem;
  }

  .countdown .countdown-time {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    font-size: 1.5rem;
    letter-spacing: 0.05em;
  }

  .countdown .countdown-time.fajr-color { color: var(--fajr); }
  .countdown .countdown-time.maghrib-color { color: var(--maghrib); }

  .countdown .countdown-done {
    font-size: 0.8rem;
    color: var(--dim);
  }

  /* Today button */
  .dua {
    text-align: center;
    flex-shrink: 0;
    max-width: 300px;
    line-height: 1.7;
  }

  .dua .dua-ar {
    font-family: 'Amiri', serif;
    font-size: 0.95rem;
    color: var(--accent);
    direction: rtl;
    unicode-bidi: isolate;
  }

  .dua .dua-en {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    color: var(--dim);
    margin-top: 0.3rem;
    letter-spacing: 0.03em;
  }

  .today-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 0.4rem 1rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    display: none;
  }

  .today-btn.visible { display: block; }
  .today-btn:active {
    background: var(--accent);
    color: var(--bg);
  }

  /* Dots */
  .dots {
    display: flex;
    gap: 3px;
    justify-content: center;
    flex-shrink: 0;
  }

  .dots .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--card-border);
    transition: all 0.2s;
  }

  .dots .dot.active {
    background: var(--accent);
    width: 12px;
    border-radius: 2px;
  }

  /* Theme toggle */
  .theme-toggle {
    position: fixed;
    top: calc(0.75rem + env(safe-area-inset-top));
    right: calc(0.75rem + env(safe-area-inset-right));
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--dim);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    z-index: 10;
    line-height: 1;
  }

  .theme-toggle:active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Language toggle */
  .lang-toggle {
    position: fixed;
    top: calc(0.75rem + env(safe-area-inset-top));
    left: calc(0.75rem + env(safe-area-inset-left));
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--dim);
    height: 32px;
    border-radius: 16px;
    font-size: 0.65rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 0.75rem;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    z-index: 10;
    text-decoration: none;
  }

  .lang-toggle:active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* High Contrast overrides for legibility */
  [data-theme="hc"] .time-block .time {
    font-weight: 800;
  }

  [data-theme="hc"] .card {
    border-width: 2px;
  }

  [data-theme="hc"] .nav button {
    border-width: 2px;
    font-weight: 700;
  }

  [data-theme="hc"] .fasting-hours {
    border-top-width: 2px;
  }
</style>
</head>

const DUAS = [
  { ar: "\u0630\u0647\u0628 \u0627\u0644\u0638\u0645\u0623 \u0648\u0627\u0628\u062A\u0644\u062A \u0627\u0644\u0639\u0631\u0648\u0642 \u0648\u062B\u0628\u062A \u0627\u0644\u0623\u062C\u0631 \u0625\u0646 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647", en: "The thirst is gone, the veins are moistened, and the reward is assured, if Allah wills" },
  { ar: "\u0627\u0644\u0644\u0647\u0645 \u0625\u0646\u064A \u0623\u0633\u0623\u0644\u0643 \u0628\u0631\u062D\u0645\u062A\u0643 \u0627\u0644\u062A\u064A \u0648\u0633\u0639\u062A \u0643\u0644 \u0634\u064A\u0621 \u0623\u0646 \u062A\u063A\u0641\u0631 \u0644\u064A", en: "O Allah, I ask You by Your mercy which encompasses all things, to forgive me" },
  { ar: "\u0631\u0628\u0646\u0627 \u0622\u062A\u0646\u0627 \u0641\u064A \u0627\u0644\u062F\u0646\u064A\u0627 \u062D\u0633\u0646\u0629 \u0648\u0641\u064A \u0627\u0644\u0622\u062E\u0631\u0629 \u062D\u0633\u0646\u0629 \u0648\u0642\u0646\u0627 \u0639\u0630\u0627\u0628 \u0627\u0644\u0646\u0627\u0631", en: "Our Lord, give us good in this world and good in the Hereafter, and protect us from the Fire" },
  { ar: "\u0627\u0644\u0644\u0647\u0645 \u0625\u0646\u0643 \u0639\u0641\u0648 \u062A\u062D\u0628 \u0627\u0644\u0639\u0641\u0648 \u0641\u0627\u0639\u0641 \u0639\u0646\u064A", en: "O Allah, You are pardoning and You love to pardon, so pardon me" },
  { ar: "\u0631\u0628 \u0627\u062C\u0639\u0644\u0646\u064A \u0645\u0642\u064A\u0645 \u0627\u0644\u0635\u0644\u0627\u0629 \u0648\u0645\u0646 \u0630\u0631\u064A\u062A\u064A \u0631\u0628\u0646\u0627 \u0648\u062A\u0642\u0628\u0644 \u062F\u0639\u0627\u0621", en: "My Lord, make me and my descendants steadfast in prayer. Our Lord, accept my supplication" },
  { ar: "\u0627\u0644\u0644\u0647\u0645 \u0623\u0639\u0646\u064A \u0639\u0644\u0649 \u0630\u0643\u0631\u0643 \u0648\u0634\u0643\u0631\u0643 \u0648\u062D\u0633\u0646 \u0639\u0628\u0627\u062F\u062A\u0643", en: "O Allah, help me to remember You, be grateful to You, and worship You well" },

  { ar: "\u0631\u0628\u0650 \u0627\u0634\u0631\u062D \u0644\u064A \u0635\u062F\u0631\u064A \u0648\u064A\u0633\u0631 \u0644\u064A \u0623\u0645\u0631\u064A", en: "My Lord, expand my chest and ease my task for me" },
  { ar: "\u062D\u0633\u0628\u0646\u0627 \u0627\u0644\u0644\u0647 \u0648\u0646\u0639\u0645 \u0627\u0644\u0648\u0643\u064A\u0644", en: "Allah is sufficient for us, and He is the best disposer of affairs" },
];

const DAYS_FULL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

const $ = id => document.getElementById(id);

let idx = 0;
let todayIdx = -1;
const sessionDua = DUAS[Math.floor(Math.random() * DUAS.length)];

function getTodayIndex() {
  const now = new Date();
  const today = now.getFullYear() + '-'
    + String(now.getMonth()+1).padStart(2,'0') + '-'
    + String(now.getDate()).padStart(2,'0');
  return DATA.findIndex(d => d.date === today);
}

function parseTime(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  return { h, m };
}

function fmt12(hhmm) {
  const { h, m } = parseTime(hhmm);
  const h12 = h % 12 || 12;
  const ampm = h < 12 ? 'AM' : 'PM';
  return { time: h12 + ':' + String(m).padStart(2,'0'), ampm };
}

function fastingDuration(fajr, mag) {
  const f = parseTime(fajr);
  const m = parseTime(mag);
  let mins = (m.h * 60 + m.m) - (f.h * 60 + f.m);
  const hrs = Math.floor(mins / 60);
  mins = mins % 60;
  return hrs + 'h ' + mins + 'm';
}

function render(direction) {
  const card = $('card');
  const cls = direction === 'left' ? 'slide-left' : direction === 'right' ? 'slide-right' : null;

  if (cls) {
    card.classList.add(cls);
    setTimeout(() => {
      update();
      card.classList.remove(cls);
    }, 120);
  } else {
    update();
  }
}

function update() {
  const d = DATA[idx];
  const dt = new Date(d.date + 'T12:00:00');

  $('dayName').textContent = DAYS_FULL[dt.getDay()];
  $('gregorian').textContent = MONTHS[dt.getMonth()] + ' ' + dt.getDate() + ', ' + dt.getFullYear();
  $('ramadanDay').textContent = 'Ramadan ' + d.r;

  const fajr = fmt12(d.fajr);
  const mag = fmt12(d.mag);
  $('fajrTime').textContent = fajr.time;
  $('fajrAmpm').textContent = fajr.ampm;
  $('maghribTime').textContent = mag.time;
  $('maghribAmpm').textContent = mag.ampm;
  $('fastHours').textContent = fastingDuration(d.fajr, d.mag);

  const card = $('card');
  card.classList.toggle('today', idx === todayIdx);

  $('todayBtn').classList.toggle('visible', idx !== todayIdx && todayIdx >= 0);

  $('progress').style.width = (d.r / DATA.length * 100) + '%';

  $('duaAr').textContent = sessionDua.ar;
  $('duaEn').textContent = sessionDua.en;

  document.querySelectorAll('.dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === idx);
  });
}

function updateCountdown() {
  if (todayIdx < 0) {
    $('countdownLabel').textContent = '';
    $('countdownTime').textContent = '';
    $('countdownTime').className = 'countdown-time';
    return;
  }

  const d = DATA[todayIdx];
  const now = new Date();
  const todayStr = d.date;

  const fajrDate = new Date(todayStr + 'T' + d.fajr + ':00');
  const magDate = new Date(todayStr + 'T' + d.mag + ':00');

  let label, target, colorClass;

  if (now < fajrDate) {
    label = 'Suhoor ends in';
    target = fajrDate;
    colorClass = 'fajr-color';
  } else if (now < magDate) {
    label = 'Iftar in';
    target = magDate;
    colorClass = 'maghrib-color';
  } else {
    $('countdownLabel').textContent = '';
    $('countdownTime').className = 'countdown-time countdown-done';
    $('countdownTime').textContent = 'Ramadan ' + d.r + ' complete';
    return;
  }

  const diff = Math.max(0, Math.floor((target - now) / 1000));
  const hh = Math.floor(diff / 3600);
  const mm = Math.floor((diff % 3600) / 60);
  const ss = diff % 60;

  $('countdownLabel').textContent = label;
  $('countdownTime').className = 'countdown-time ' + colorClass;
  $('countdownTime').textContent =
    String(hh).padStart(2,'0') + ':' +
    String(mm).padStart(2,'0') + ':' +
    String(ss).padStart(2,'0');
}

// Build dots
const dotsEl = $('dots');
DATA.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot';
  dotsEl.appendChild(dot);
});

// Init
todayIdx = getTodayIndex();
idx = todayIdx >= 0 ? todayIdx : 0;
render();
updateCountdown();
setInterval(updateCountdown, 1000);

// Navigation
$('prev').addEventListener('click', () => {
  if (idx > 0) { idx--; render('right'); }
});
$('next').addEventListener('click', () => {
  if (idx < DATA.length - 1) { idx++; render('left'); }
});
$('todayBtn').addEventListener('click', () => {
  if (todayIdx >= 0) {
    const dir = idx > todayIdx ? 'right' : 'left';
    idx = todayIdx;
    render(dir);
  }
});

// Swipe support
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    if (dx < 0 && idx < DATA.length - 1) { idx++; render('left'); }
    else if (dx > 0 && idx > 0) { idx--; render('right'); }
  }
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' && idx > 0) { idx--; render('right'); }
  if (e.key === 'ArrowRight' && idx < DATA.length - 1) { idx++; render('left'); }
});

// Theme switching
const THEMES = ['light', 'dark', 'hc'];
const THEME_ICONS = { dark: '\u263D', light: '\u2600', hc: '\u25C9' };
const THEME_META = { dark: '#0a0a0c', light: '#faf7f2', hc: '#ffffff' };

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  $('themeToggle').textContent = THEME_ICONS[theme];
  document.querySelector('meta[name="theme-color"]').content = THEME_META[theme];
  document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]').content =
    theme === 'dark' ? 'black-translucent' : 'default';
  try { localStorage.setItem('theme', theme); } catch(e) {}
}

$('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = THEMES[(THEMES.indexOf(current) + 1) % THEMES.length];
  applyTheme(next);
});

// Restore saved theme
applyTheme((() => {
  try { const t = localStorage.getItem('theme'); return THEMES.includes(t) ? t : 'light'; }
  catch(e) { return 'light'; }
})());
</script>

</body>
</html>
